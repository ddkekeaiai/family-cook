<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>家庭菜谱 - 扫码入口</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#F5F5F5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:20px}
.card{background:white;border-radius:20px;padding:30px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.1);max-width:420px;width:100%}
h1{font-size:22px;color:#FF6B35;margin-bottom:4px}
.sub{font-size:13px;color:#999;margin-bottom:12px}
.qrcode{width:200px;height:200px;margin:0 auto 12px;border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.qrcode img{width:100%;height:100%;display:block}
.login-url{font-size:11px;color:#ccc;word-break:break-all;margin-bottom:12px;padding:6px 10px;background:#F8F8F8;border-radius:6px}
.urls{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.url-btn{display:block;padding:12px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none}
.url-btn.entry{background:linear-gradient(135deg,#FF6B35,#FF8F47);color:white;box-shadow:0 4px 12px rgba(255,107,53,.3)}
.url-btn.admin{background:white;color:#FF6B35;border:2px solid #FF6B35}
.desc{font-size:12px;color:#999;line-height:1.8;text-align:left;margin-top:12px;padding:12px;background:#F8F8F8;border-radius:8px}
.desc strong{color:#FF6B35}
</style>
</head>
<body>
<div class="card">
  <h1>🍳 家庭菜谱</h1>
  <p class="sub">扫码打开，首次输密码，之后自动登录</p>
  <div class="qrcode">
    <img id="qrImg" alt="加载二维码中...">
  </div>
  <div class="login-url" id="loginUrl"></div>
  <div class="urls">
    <a id="entryLink" class="url-btn entry">📱 打开登录页</a>
    <a id="adminLink" class="url-btn admin">⚙️ 管理后台</a>
  </div>
  <div class="desc">
    首次使用请选择身份 → 输入密码<br>
    之后再次扫码会 <strong>自动登录</strong>，无需重复输密码<br><br>
    默认密码：<strong>admin123</strong>
  </div>
</div>

<script>
// 动态生成二维码，以当前服务地址为准
const baseUrl = window.location.origin + '/login.html'
document.getElementById('qrImg').src = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(baseUrl)
document.getElementById('loginUrl').textContent = baseUrl
document.getElementById('entryLink').href = baseUrl
document.getElementById('adminLink').href = window.location.origin + '/admin.html'
</script>
</body>
</html>
